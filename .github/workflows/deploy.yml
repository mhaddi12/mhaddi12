name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # Use repo secrets if set, otherwise dummy values are fine —
          # blog pages are force-dynamic so MongoDB is never called at build time.
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb+srv://dummy:dummy@localhost/portfolio' }}
          BLOG_SECRET: ${{ secrets.BLOG_SECRET || 'ci-placeholder' }}
