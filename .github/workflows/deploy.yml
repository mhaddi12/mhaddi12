name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          BLOG_SECRET: ${{ secrets.BLOG_SECRET }}

# Deployment is handled automatically by Vercel.
# Connect your GitHub repo at vercel.com → Import Project.
# Add MONGODB_URI and BLOG_SECRET in Vercel → Settings → Environment Variables.
